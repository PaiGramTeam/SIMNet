[tool.poetry]
name = "SIMNet"
version = "0.1.0"
description = "Modern API wrapper for Genshin Impact & Honkai: Star Rail built on asyncio and pydantic."
authors = ["PaiGramTeam"]
license = "MIT license"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.8"
httpx = "^0.24.0"
pydantic = "^1.10.7"
pytest = { version = "^7.3.1", optional = true }
pytest-asyncio = { version = "^0.21.0", optional = true }
python-dotenv = { version = "^1.0.0", optional = true }

[tool.poetry.dev-dependencies]
pytest = "^7.3.1"
pytest-asyncio = "^0.21.0"
python-dotenv = "^1.0.0"
black = "^22.10.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
asyncio_mode = "auto"
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"

[tool.black]
include = '\.pyi?$'
line-length = 120
target-version = ['py38']


[tool.setuptools.package-data]
simnet = ["py.typed"]